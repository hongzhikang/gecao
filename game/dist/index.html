<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>割草幸存者 - Gecao Survivors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    #game-container { width: 100vw; height: 100vh; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 10;
    }
    #ui-overlay .hp-bar {
      position: absolute; top: 12px; left: 12px; width: 200px; height: 20px;
      background: #333; border: 2px solid #666; border-radius: 4px;
      overflow: hidden;
    }
    #ui-overlay .hp-fill {
      height: 100%; background: linear-gradient(90deg, #c00, #f44); transition: width 0.2s;
    }
    #ui-overlay .xp-bar {
      position: absolute; bottom: 12px; left: 12px; right: 12px; height: 16px;
      background: #222; border: 2px solid #444; border-radius: 4px;
      overflow: hidden;
    }
    #ui-overlay .xp-fill {
      height: 100%; background: linear-gradient(90deg, #08c, #0cf); transition: width 0.2s;
    }
    #ui-overlay .level-text {
      position: absolute; bottom: 34px; left: 12px; color: #fff; font: 14px sans-serif;
    }
    #ui-overlay .kill-timer {
      position: absolute; top: 12px; right: 12px; color: #fff; font: 14px sans-serif;
    }
    #ui-overlay .wave-num {
      position: absolute; top: 40px; left: 12px; color: #8af; font: 13px sans-serif;
      text-shadow: 0 0 4px #000;
    }
    #ui-overlay .pause-btn {
      position: absolute; bottom: 12px; right: 12px; padding: 6px 12px; font-size: 12px;
      background: #333; color: #fff; border: 1px solid #666; border-radius: 4px;
      cursor: pointer; pointer-events: auto; z-index: 11;
    }
    #wave-reward-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.95); border: 2px solid #0af; border-radius: 8px; padding: 20px; z-index: 25; pointer-events: auto; min-width: 300px; }
    #wave-reward-panel.visible { display: block !important; }
    #wave-reward-panel .choice { margin: 8px 0; padding: 12px; background: #222; border-radius: 4px; cursor: pointer; color: #fff; }
    #chest-reward-panel.visible { display: block !important; }
    #chest-reward-panel .choice {
      margin: 8px 0;
      padding: 12px;
      background: #222;
      border-radius: 4px;
      cursor: pointer;
      color: #fff;
      font-size: 14px;
      line-height: 1.5;
    }
    #chest-reward-panel .choice:hover { background: #333; }
    #game-over-panel.game-over-hidden { display: none !important; }
    #game-over-panel:not(.game-over-hidden) { display: flex !important; }
    #game-over-panel #game-over-restart:hover { background: #444; border-color: #0cf; }
    #difficulty-select.visible { display: flex !important; }
    .diff-btn { background: #333; color: #fff; border: 2px solid #666; border-radius: 6px; }
    .diff-btn:hover { border-color: #0af; background: #444; }
    .diff-btn.selected { border-color: #0af; background: #2a2a4a; }
    #upgrade-panel {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9); border: 2px solid #0af; border-radius: 8px;
      padding: 20px; z-index: 20; pointer-events: auto; min-width: 320px;
    }
    #upgrade-panel.visible { display: block; }
    #upgrade-panel h2 { color: #0af; margin-bottom: 12px; text-align: center; }
    #upgrade-panel .choice { margin: 8px 0; padding: 12px; background: #222; border-radius: 4px; cursor: pointer; color: #fff; }
    #upgrade-panel .choice:hover { background: #333; }
    /* 角色选择界面 */
    #character-select {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(180deg, #0a0a12 0%, #1a1a2e 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; box-sizing: border-box;
    }
    #character-select.hidden { display: none; }
    #character-select h1 {
      color: #e0e0e0; font-size: 28px; margin-bottom: 8px; font-family: sans-serif;
    }
    #character-select .subtitle {
      color: #888; font-size: 14px; margin-bottom: 32px;
    }
    #character-select .cards {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; max-width: 900px;
    }
    #character-select .card {
      width: 260px; background: rgba(30,30,50,0.9); border: 2px solid #444;
      border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s;
      text-align: center;
    }
    #character-select .card:hover {
      border-color: #0af; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,170,255,0.2);
    }
    #character-select .card img {
      width: 120px; height: 120px; object-fit: contain; display: block; margin: 0 auto 12px;
      image-rendering: pixelated; image-rendering: crisp-edges;
    }
    #character-select .card .name { color: #0af; font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    #character-select .card .desc { color: #aaa; font-size: 13px; line-height: 1.4; }
    /* 加载进度条 */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 200; background: rgba(10,10,18,0.95);
      display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #loading-overlay.visible { display: flex !important; }
    #loading-overlay .loading-text { color: #8af; font-size: 16px; }
    #loading-overlay .loading-bar-wrap {
      width: 280px; height: 12px; background: #222; border: 2px solid #444; border-radius: 6px; overflow: hidden;
    }
    #loading-overlay .loading-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #08c, #0cf); transition: width 0.15s;
    }
  </style>
  <script type="module" crossorigin src="/game/assets/index-jp1oAXeO.js"></script>
</head>
<body>
  <div id="loading-overlay">
    <span class="loading-text">加载资源中…</span>
    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
  </div>
  <div id="character-select">
    <h1>割草幸存者</h1>
    <p class="subtitle">选择模式与职业开始战斗</p>
    <div style="display:flex;gap:12px;margin-bottom:12px;">
      <button type="button" class="diff-btn selected" id="mode-classic">经典模式</button>
      <button type="button" class="diff-btn" id="mode-survival">生存模式</button>
    </div>
    <p class="subtitle" style="margin-bottom:6px;">选择章节</p>
    <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;">
      <button type="button" class="diff-btn chapter-btn selected" id="chapter-none" style="padding:6px 16px;font-size:14px;">无章节（原始模式）</button>
      <button type="button" class="diff-btn chapter-btn" id="chapter-grass" style="padding:6px 16px;font-size:14px;">第一章·荒野试炼</button>
    </div>
    <p class="subtitle" style="margin-bottom:8px;">选择职业</p>
    <div class="cards">
      <div class="card" data-class="warrior">
        <img data-src="assets/characters/warrior_idle.png" alt="战士" />
        <div class="name">战士</div>
        <div class="desc">近战范围攻击，攻速提升，旋风斩技能。适合正面迎敌。</div>
      </div>
      <div class="card" data-class="mage">
        <img data-src="assets/characters/mage_idle.png" alt="法师" />
        <div class="name">法师</div>
        <div class="desc">远程弹道攻击，范围爆炸，冰冻减速。适合风筝与控场。</div>
      </div>
      <div class="card" data-class="summoner">
        <img data-src="assets/characters/summoner_idle.png" alt="召唤师" />
        <div class="name">召唤师</div>
        <div class="desc">召唤小弟自动攻击，可升级召唤数量。适合人海战术。</div>
      </div>
    </div>
  </div>
  <script>
    (function(){
      function setCharacterImageSrc() {
        var pathname = window.location.pathname || '/';
        var dir;
        if (pathname.endsWith('/')) {
          dir = pathname;
        } else {
          var last = pathname.split('/').pop() || '';
          if (last.indexOf('.') !== -1) {
            dir = (pathname.replace(/\/[^/]*$/, '') || '/');
          } else {
            dir = pathname + '/';
          }
          if (dir !== '/' && !dir.endsWith('/')) dir += '/';
        }
        var origin = window.location.origin || '';
        var base = origin + dir;
        var rootUrl = origin + '/';
        document.querySelectorAll('#character-select img[data-src]').forEach(function(img) {
          var p = img.getAttribute('data-src');
          if (!p) return;
          var path = p.charAt(0) === '/' ? p.slice(1) : p;
          var primary = base + path;
          img.onerror = function() {
            img.onerror = null;
            img.src = rootUrl + path;
          };
          img.src = primary;
        });
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setCharacterImageSrc);
      else setCharacterImageSrc();
    })();
  </script>
  <div id="game-container"></div>
  <div id="ui-overlay">
    <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
    <div class="kill-timer">Kills: <span id="kill-count">0</span> | <span id="survival-timer">00:00</span></div>
    <div class="wave-num" id="wave-num">波次 <span id="wave-count">0</span></div>
    <div class="level-text">Lv.<span id="level-num">1</span></div>
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    <button type="button" class="pause-btn" id="pause-btn">暂停</button>
  </div>
  <div id="wave-reward-panel">
    <h2 id="wave-reward-title" style="color:#0af;margin-bottom:12px;text-align:center;">波次完成</h2>
    <div id="wave-reward-choices"></div>
  </div>
  <div id="upgrade-panel">
    <h2>升级！选择一项</h2>
    <div id="upgrade-choices"></div>
  </div>
  <div id="chest-reward-panel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:2px solid #daa520;border-radius:8px;padding:20px;z-index:25;pointer-events:auto;min-width:300px;max-width:90vw;">
    <h2 id="chest-reward-title" style="color:#daa520;margin-bottom:12px;text-align:center;">选择一项强化</h2>
    <div id="chest-reward-choices"></div>
  </div>
  <div id="game-over-panel" class="game-over-hidden" style="position:fixed;inset:0;z-index:95;background:rgba(0,0,0,0.92);flex-direction:column;align-items:center;justify-content:center;padding:24px;pointer-events:auto;">
    <h2 style="color:#f44;font-size:32px;margin-bottom:24px;">游戏结束</h2>
    <p id="game-over-stats" style="color:#ccc;font-size:18px;margin-bottom:20px;text-align:center;">击杀 0 | 存活 00:00</p>
    <button id="game-over-restart" type="button" style="padding:14px 32px;font-size:18px;cursor:pointer;background:#333;color:#fff;border:2px solid #0af;border-radius:8px;">重新开始</button>
  </div>
  <div id="difficulty-select" style="display:none;position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0.9);flex-direction:column;align-items:center;justify-content:center;padding:20px;">
    <h2 style="color:#fff;margin-bottom:16px;">选择难度</h2>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <button class="diff-btn" data-diff="easy" style="padding:12px 24px;font-size:16px;cursor:pointer;">简单</button>
      <button class="diff-btn" data-diff="normal" style="padding:12px 24px;font-size:16px;cursor:pointer;">普通</button>
      <button class="diff-btn" data-diff="hard" style="padding:12px 24px;font-size:16px;cursor:pointer;">困难</button>
      <button class="diff-btn" data-diff="hell" style="padding:12px 24px;font-size:16px;cursor:pointer;">地狱</button>
    </div>
  </div>
</body>
</html>
